const hemi=new THREE.HemisphereLight(0xeaf0f7,0x0b1220,.7); scene.add(hemi);

const rim=new THREE.DirectionalLight(0xdbe8ff,.4); rim.position.set(-2.7,2.6,3.4); scene.add(rim);

  secondaryColor:'#7A7268',
  tintStrength:.1,
  variation:.12,
  metalness:0,
  roughness:.68,
  textureDefault:34,
  exposure:.66,
  envMapIntensity:.18,
  emissiveIntensity:0,
  mapLift:.16,
  mapFloor:.05,
  backdropTop:'#15243A',
  backdropBase:'#15243A',
  backdropGlow:'#D7DEE8',

  rimLightIntensity:1.16,

    `radial-gradient(70% 52% at 50% 20%, ${glow}, transparent 72%)`,

function applyLighting(appearance){

  key.intensity=appearance.keyLightIntensity ?? defaultAppearance.keyLightIntensity;
  fill.intensity=appearance.fillLightIntensity ?? defaultAppearance.fillLightIntensity;

function addMaterialVariation(mesh, material, appearance) {
  const position=mesh.geometry?.attributes?.position;

  const secondary=new THREE.Color(appearance.secondaryColor || appearance.baseColor);
  const seed=noise01(String(mesh.name || material.name || 'atrium').length*17.17);

    const x=position.getX(i), y=position.getY(i), z=position.getZ(i);

    name: source.name || 'atrium-material',

uniform float atriumMapLift;

#include <map_fragment>
#ifdef USE_MAP
